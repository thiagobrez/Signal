name: Signal
options:
  bundleIdPrefix: com.thiagobrez
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DynamicNotchKit:
    path: LocalPackages/DynamicNotchKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 1.10.0
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4

settings:
  base:
    # DEVELOPMENT_TEAM is intentionally NOT set here so it stays out of the
    # public repo. The target pulls it in via configFiles -> Config/Signing.xcconfig,
    # which optionally includes the gitignored Config/Signing.local.xcconfig.
    # See Config/Signing.local.xcconfig.example.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    # Managed by changesets: package.json is the source of truth, and
    # scripts/sync-version.sh rewrites this line. Do not hand-edit.
    MARKETING_VERSION: "1.3.0"
    # Overridden per-release in CI (xcodebuild CURRENT_PROJECT_VERSION=<n>).
    CURRENT_PROJECT_VERSION: "1"

# Two app variants share everything through this template. They must be
# separate targets (not configs) because Sparkle may only be linked into the
# direct-download build: the Mac App Store rejects apps that embed it.
targetTemplates:
  SignalApp:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Build.xcconfig
      Release: Config/Build.xcconfig
    sources:
      - path: Signal
        excludes:
          # Each variant's own INFOPLIST_FILE is excluded from resources
          # automatically, but the *other* variant's plist would be bundled
          # as a stray resource without this.
          - "Info*.plist"
      # The changesets-maintained changelog ships in the bundle so the
      # What's New window can show release notes offline. `buildPhase` is
      # explicit because XcodeGen leaves .md files out of all phases.
      - path: CHANGELOG.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ski.brezin.signal
        PRODUCT_NAME: Signal
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Signal
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Signal/Signal.entitlements
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: DynamicNotchKit
      - package: KeyboardShortcuts
      - package: TelemetryDeck

targets:
  # Direct-download (DMG) variant: self-updates via Sparkle. This is the
  # default target for local development.
  Signal:
    templates: [SignalApp]
    settings:
      base:
        INFOPLIST_FILE: Signal/Info.plist
    dependencies:
      - package: Sparkle
  # Mac App Store variant: no Sparkle, update UI compiled out via APPSTORE.
  SignalAppStore:
    templates: [SignalApp]
    settings:
      base:
        INFOPLIST_FILE: Signal/Info-AppStore.plist
        # $(inherited) keeps XcodeGen's DEBUG condition in Debug builds.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) APPSTORE"
  # Pure-logic unit tests (date parser, recurrence math, schedule CRUD). The
  # files under test are compiled straight into the bundle — no app host — so
  # running tests never launches the app or touches its SwiftData store
  # (repository tests use their own in-memory container).
  SignalTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: SignalTests
      - path: Signal/Schedule/NaturalDateParser.swift
      - path: Signal/WhatsNew/ChangelogParser.swift
      - path: Signal/Schedule/ScheduleEdit.swift
      - path: Signal/Schedule/ScheduleGrid.swift
      - path: Signal/Models/ScheduledTask.swift
      - path: Signal/Models/DayLog.swift
      - path: Signal/Models/TodoItem.swift
      - path: Signal/Store/ScheduleRepository.swift

# Shared schemes so `xcodebuild -scheme <name>` works in CI (schemes only
# auto-generate when the project is opened in Xcode's UI).
schemes:
  Signal:
    build:
      targets:
        Signal: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SignalTests
    archive:
      config: Release
  SignalAppStore:
    build:
      targets:
        SignalAppStore: all
    run:
      config: Debug
    archive:
      config: Release
