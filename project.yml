name: Signal
options:
  bundleIdPrefix: com.thiagobrez
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DynamicNotchKit:
    path: LocalPackages/DynamicNotchKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 1.10.0
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: 2.0.0

settings:
  base:
    # DEVELOPMENT_TEAM is intentionally NOT set here so it stays out of the
    # public repo. The target pulls it in via configFiles -> Config/Signing.xcconfig,
    # which optionally includes the gitignored Config/Signing.local.xcconfig.
    # See Config/Signing.local.xcconfig.example.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    # Managed by changesets: package.json is the source of truth, and
    # scripts/sync-version.sh rewrites this line. Do not hand-edit.
    MARKETING_VERSION: "1.0.2"
    # Overridden per-release in CI (xcodebuild CURRENT_PROJECT_VERSION=<n>).
    CURRENT_PROJECT_VERSION: "1"

targets:
  Signal:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Build.xcconfig
      Release: Config/Build.xcconfig
    sources:
      - path: Signal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ski.brezin.signal
        PRODUCT_NAME: Signal
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Signal/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Signal
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Signal/Signal.entitlements
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: DynamicNotchKit
      - package: KeyboardShortcuts
      - package: TelemetryDeck

# Shared scheme so `xcodebuild -scheme Signal` works in CI (schemes only
# auto-generate when the project is opened in Xcode's UI).
schemes:
  Signal:
    build:
      targets:
        Signal: all
    run:
      config: Debug
    archive:
      config: Release
