name: Signal
options:
  bundleIdPrefix: com.thiagobrez
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DynamicNotchKit:
    path: LocalPackages/DynamicNotchKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 1.10.0

settings:
  base:
    # DEVELOPMENT_TEAM is intentionally NOT set here so it stays out of the
    # public repo. The target pulls it in via configFiles -> Config/Signing.xcconfig,
    # which optionally includes the gitignored Config/Signing.local.xcconfig.
    # See Config/Signing.local.xcconfig.example.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Signal:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: Signal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ski.brezin.signal
        PRODUCT_NAME: Signal
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Signal
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Signal/Signal.entitlements
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: DynamicNotchKit
      - package: KeyboardShortcuts
